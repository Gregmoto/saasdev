[phases.install]
cmds = ["npm install -g pnpm && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @saas-shop/storefront build"]

[start]
cmd = "node apps/storefront/.next/standalone/apps/storefront/server.js"

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
PORT = "3002"
