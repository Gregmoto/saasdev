[phases.install]
cmds = []

[phases.build]
cmds = [
  "npm install -g pnpm@9",
  "pnpm install --frozen-lockfile",
  "pnpm --filter @saas-shop/storefront build"
]

[start]
cmd = "node apps/storefront/.next/standalone/apps/storefront/server.js"

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
PORT = "3002"
