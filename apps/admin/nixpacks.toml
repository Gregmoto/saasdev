# Railway Nixpacks config — Admin Next.js app
# Railway root directory for this service should be set to: apps/admin
# But since we upload from monorepo root, we build from here.
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "corepack enable && corepack prepare pnpm@latest --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm --filter @saas-shop/admin build"]

[start]
cmd = "node apps/admin/.next/standalone/apps/admin/server.js"

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
PORT = "3001"
