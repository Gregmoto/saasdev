[phases.install]
cmds = ["npm install -g pnpm && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @saas-shop/marketing build"]

[start]
cmd = "node apps/marketing/.next/standalone/apps/marketing/server.js"

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
PORT = "3003"
