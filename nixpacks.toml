# Railway Railpack config — Fastify API
# Use tsx to run TypeScript directly (avoids dist layer issue)

[phases.install]
cmds = []

[phases.build]
cmds = [
  "npm install -g pnpm@9",
  "pnpm install --frozen-lockfile"
]

[start]
cmd = "node --import tsx/esm src/server.ts"

[variables]
NODE_ENV = "production"
