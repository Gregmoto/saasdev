# Railway Nixpacks/Railpack config — Fastify API (monorepo root)
# Railway auto-detects pnpm from pnpm-lock.yaml

[phases.install]
cmds = ["npm install -g pnpm && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @saas-shop/api build"]

[start]
cmd = "node dist/server.js"

[variables]
NODE_ENV = "production"
