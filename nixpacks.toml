# Railway Railpack config — Fastify API
# All steps in build phase (runs after source copy)

[phases.install]
cmds = []

[phases.build]
cmds = [
  "npm install -g pnpm@9",
  "pnpm install --frozen-lockfile",
  "pnpm --filter @saas-shop/api build"
]

[start]
cmd = "node dist/server.js"

[variables]
NODE_ENV = "production"
